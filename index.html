<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة درب | طريقك للقمة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --main-gold: #c6a355;
            --text-white: #ffffff;
            --input-bg: #0d1117;
            --google-red: #db4437;
            --apple-black: #000000;
            --fb-blue: #4267B2;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-white);
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .auth-container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #30363d;
        }

        .falcon-logo {
            font-size: 50px;
            color: var(--main-gold);
            margin-bottom: 10px;
        }

        h2 { margin-bottom: 30px; font-weight: 700; }

        .tabs {
            display: flex;
            margin-bottom: 25px;
            background: var(--input-bg);
            border-radius: 10px;
            padding: 5px;
        }

        .tab {
            flex: 1;
            padding: 10px;
            cursor: pointer;
            border-radius: 8px;
            transition: 0.3s;
        }

        .tab.active {
            background: var(--main-gold);
            color: #000;
            font-weight: bold;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: right;
        }

        input {
            width: 100%;
            padding: 12px;
            margin-top: 5px;
            border-radius: 10px;
            border: 1px solid #30363d;
            background: var(--input-bg);
            color: white;
            box-sizing: border-box;
            outline: none;
        }

        input:focus { border-color: var(--main-gold); }

        .main-btn {
            width: 100%;
            padding: 12px;
            background: var(--main-gold);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }

        .main-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(198, 163, 85, 0.3); }

        .divider {
            margin: 25px 0;
            position: relative;
            border-bottom: 1px solid #30363d;
        }

        .divider span {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);
            padding: 0 15px;
            color: #8b949e;
            font-size: 14px;
        }

        .social-btns {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            border: 1px solid #30363d;
            transition: 0.3s;
            font-size: 14px;
        }

        .btn-google { color: var(--google-red); }
        .btn-apple { color: #fff; background: #000; }
        .btn-fb { color: var(--fb-blue); }

        .social-btn:hover { background: #30363d; }

    </style>
</head>
<body>

    <div class="auth-container">
        <div class="falcon-logo">
            <i class="fas fa-feather-alt"></i> </div>
        <h2 id="auth-title">منصة درب</h2>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('signin')">دخول</div>
            <div class="tab" onclick="switchTab('signup')">تسجيل جديد</div>
        </div>

        <div id="auth-form">
            <div class="input-group">
                <input type="email" placeholder="البريد الإلكتروني">
            </div>
            <div class="input-group">
                <input type="password" placeholder="كلمة المرور">
            </div>
            <button class="main-btn" id="submit-btn">تسجيل الدخول</button>
        </div>

        <div class="divider">
            <span>أو عبر</span>
        </div>

        <div class="social-btns">
            <div class="social-btn btn-google">
                <i class="fab fa-google"></i> متابعة باستخدام جوجل
            </div>
            <div class="social-btn btn-apple">
                <i class="fab fa-apple"></i> متابعة باستخدام أبل
            </div>
            <div class="social-btn btn-fb">
                <i class="fab fa-facebook"></i> متابعة باستخدام فيسبوك
            </div>
        </div>
    </div>

    <script>
        function switchTab(type) {
            const tabs = document.querySelectorAll('.tab');
            const submitBtn = document.getElementById('submit-btn');
            const authTitle = document.getElementById('auth-title');

            tabs.forEach(t => t.classList.remove('active'));
            
            if(type === 'signin') {
                tabs[0].classList.add('active');
                submitBtn.innerText = 'تسجيل الدخول';
                authTitle.innerText = 'منصة درب - دخول';
            } else {
                tabs[1].classList.add('active');
                submitBtn.innerText = 'إنشاء حساب';
                authTitle.innerText = 'منصة درب - تسجيل';
            }
        }
    </script>
</body>
</html>
