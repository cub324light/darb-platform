<!DOCTYPE html>
<html lang="ar" dir="rtl" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>درب</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&family=IBM+Plex+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* الوان الوضع الداكن - أسود نقي مع لمسات زرقاء ساحرة */
[data-theme="dark"]{
  --bg:#000000;--s1:#0D0D0D;--s2:#111111;--card:#0E0E16;--card2:#121220;
  --b1:#1A1A2A;--b2:#202038;--b3:#28284A;
  --text:#F0F0F8;--t2:#506090;--t3:#283050;
  --acc:#1E40AF;--acc2:#3B82F6;
  --g1:#C89018;--g2:#E0A820;--gg:linear-gradient(135deg,#C89018,#E0A820);
  --sh:0 8px 32px rgba(0,0,0,.85);--ibg:#0D0D0D;
}
/* الوان الوضع الفاتح - أبيض نقي مع لمسات ذهبية فاخرة */
[data-theme="light"]{
  --bg:#FFFFFF;--s1:#FAFAFA;--s2:#F5F5F5;--card:#FFFFFF;--card2:#FAFAF8;
  --b1:#EBEBEB;--b2:#E0E0E0;--b3:#D4D4D4;
  --text:#181810;--t2:#706848;--t3:#A09878;
  --acc:#92700A;--acc2:#B88A10;
  --g1:#B88A10;--g2:#CC9E18;--gg:linear-gradient(135deg,#B88A10,#CC9E18);
  --sh:0 4px 18px rgba(0,0,0,.07);--ibg:#FAFAF8;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px; background:var(--bg);}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;direction:rtl;transition:background .3s,color .3s}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:var(--b2);border-radius:99px}
::selection{background:var(--g1);color:#000}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:none}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes soar{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes fIn{from{opacity:0}to{opacity:1}}

/* APP SHELL */
.app{display:flex;flex-direction:column;min-height:100vh;max-width:480px;margin:0 auto;background:var(--bg)}

/* HEADER */
.hdr{position:sticky;top:0;z-index:100;background:var(--s1);border-bottom:1px solid var(--b1);padding:10px 14px;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-size:19px;font-weight:900;letter-spacing:-.5px;background:var(--gg);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hdr-r{display:flex;gap:6px;align-items:center}
.hb{width:33px;height:33px;border-radius:8px;background:var(--card);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--t2);-webkit-text-fill-color:var(--t2);transition:all .15s;font-family:'IBM Plex Mono';font-weight:600}
.hb:hover{border-color:var(--g1);color:var(--g2);-webkit-text-fill-color:var(--g2)}
.tp{font-size:9px;padding:3px 8px;border-radius:99px;font-weight:700;font-family:'IBM Plex Mono';border:1px solid;cursor:pointer}
.tp-a{background:rgba(200,144,24,.1);color:var(--g2);border-color:rgba(200,144,24,.3)}
.tp-b{background:rgba(139,92,246,.1);color:#A78BFA;border-color:rgba(139,92,246,.3)}
.tp-c{background:rgba(239,68,68,.1);color:#F87171;border-color:rgba(239,68,68,.3)}

/* BOTTOM NAV */
.bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;z-index:100;background:var(--s1);border-top:1px solid var(--b1);display:flex;padding:5px 2px calc(5px + env(safe-area-inset-bottom))}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:4px 1px;cursor:pointer;border-radius:7px;color:var(--t3);min-height:46px;gap:2px;transition:color .15s}
.bni.on{color:var(--g2)}
.bni-i{font-size:18px;line-height:1;transition:transform .2s}
.bni.on .bni-i{transform:scale(1.1)}
.bni-l{font-size:9px;font-weight:600;white-space:nowrap}

/* PAGES */
.pages{flex:1;overflow-y:auto;padding-bottom:calc(60px + env(safe-area-inset-bottom))}
.pg{display:none;padding:14px;animation:fadeUp .3s ease both}
.pg.on{display:block}

/* TYPOGRAPHY */
.sec-t{font-size:16px;font-weight:800;letter-spacing:-.3px}
.sec-s{font-size:11px;color:var(--t2);margin-top:1px}
.ts{font-size:13px}.txs{font-size:11px}.ttny{font-size:10px}
.tm{color:var(--t2)}.t3{color:var(--t3)}
.fw7{font-weight:700}.fw8{font-weight:800}.fw9{font-weight:900}
.mono{font-family:'IBM Plex Mono'}

/* CARDS */
.card{background:var(--card);border:1px solid var(--b1);border-radius:13px;padding:14px;margin-bottom:10px}
.gc{background:linear-gradient(135deg,rgba(200,144,24,.05),var(--card));border-color:rgba(200,144,24,.18)}
.cl{font-size:9px;font-weight:700;color:var(--t2);letter-spacing:.7px;text-transform:uppercase;margin-bottom:10px;font-family:'IBM Plex Mono';display:flex;align-items:center;gap:5px}
.cl::before{content:'';width:3px;height:10px;background:var(--g1);border-radius:99px;flex-shrink:0}

/* LAYOUT */
.g2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:7px}
.rb{display:flex;align-items:center}
.rbb{display:flex;align-items:center;justify-content:space-between}
.g6{gap:6px}.g8{gap:8px}.g10{gap:10px}
.mt8{margin-top:8px}.mt10{margin-top:10px}.mt12{margin-top:12px}
.mb8{margin-bottom:8px}.mb10{margin-bottom:10px}.mb12{margin-bottom:12px}
.dv{height:1px;background:var(--b1);margin:12px 0}
.sdv{height:8px;background:var(--s2);margin:0 -14px 14px}
.w100{width:100%}.tc{text-align:center}

/* PROGRESS */
.pw{background:var(--b1);border-radius:99px;overflow:hidden}
.pf{height:100%;border-radius:99px;transition:width .8s ease;position:relative;overflow:hidden}
.pf::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent);background-size:200% 100%;animation:shimmer 2.5s infinite}
.pg{background:linear-gradient(90deg,var(--g1),var(--g2))}

/* STATS */
.sb{background:var(--card);border:1px solid var(--b1);border-radius:11px;padding:12px;position:relative;overflow:hidden}
.sb::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--sbc,var(--g1))}
.sbv{font-size:23px;font-weight:900;font-family:'IBM Plex Mono';letter-spacing:-1px}
.sbl{font-size:10px;color:var(--t2);margin-top:2px}
.sbc-t{font-size:9px;margin-top:3px;font-weight:700;font-family:'IBM Plex Mono'}
.cup{color:#10B981}.cdn{color:#EF4444}.cnt{color:var(--t2)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 15px;border-radius:9px;border:none;cursor:pointer;font-family:'Tajawal';font-size:13px;font-weight:700;transition:all .15s;white-space:nowrap}
.bp{background:var(--gg);color:#000}.bp:hover{transform:translateY(-1px);box-shadow:0 4px 12px rgba(200,144,24,.3)}
.bg{background:var(--card2);color:var(--t2);border:1px solid var(--b2)}.bg:hover{color:var(--text)}

/* BADGES */
.bdg{display:inline-block;padding:2px 7px;border-radius:99px;font-size:9px;font-weight:700;font-family:'IBM Plex Mono';border:1px solid}
.bg-g{background:rgba(200,144,24,.1);color:var(--g2);border-color:rgba(200,144,24,.25)}
.bg-gr{background:rgba(16,185,129,.08);color:#34D399;border-color:rgba(16,185,129,.2)}
.bg-re{background:rgba(239,68,68,.08);color:#F87171;border-color:rgba(239,68,68,.2)}
.bg-pu{background:rgba(139,92,246,.08);color:#A78BFA;border-color:rgba(139,92,246,.2)}
.bg-mt{background:var(--card2);color:var(--t2);border-color:var(--b2)}

/* INPUT */
.inp{width:100%;padding:10px 12px;background:var(--ibg);border:1px solid var(--b2);border-radius:9px;color:var(--text);font-family:'Tajawal';font-size:13px;outline:none;transition:border-color .2s;direction:rtl}
.inp:focus{border-color:rgba(200,144,24,.5)}
.inp::placeholder{color:var(--t3)}
textarea.inp{resize:vertical;min-height:70px;line-height:1.7}

/* TOGGLE */
.tog{width:38px;height:21px;border-radius:99px;cursor:pointer;position:relative;transition:background .2s;border:none;padding:0;flex-shrink:0}
.tog.on{background:var(--gg)}.tog.off{background:var(--b2)}
.tob{position:absolute;top:3px;width:15px;height:15px;background:#fff;border-radius:50%;transition:all .2s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.tog.on .tob{right:3px;left:auto}.tog.off .tob{left:3px;right:auto}

/* LIST ITEMS */
.li{display:flex;align-items:center;gap:9px;padding:10px 12px;background:var(--card2);border:1px solid var(--b1);border-radius:9px;margin-bottom:6px;cursor:pointer;transition:all .15s}
.li:hover{border-color:var(--b2)}
.li-b{flex:1;min-width:0}.li-t{font-size:12px;font-weight:700}.li-s{font-size:10px;color:var(--t2);margin-top:1px}

/* TOAST */
.toast{position:fixed;bottom:calc(56px + env(safe-area-inset-bottom) + 8px);left:50%;transform:translateX(-50%) translateY(70px);z-index:9999;padding:9px 14px;border-radius:10px;background:var(--card2);border:1px solid var(--b3);box-shadow:var(--sh);font-size:12px;font-weight:600;opacity:0;white-space:nowrap;transition:all .3s cubic-bezier(.4,0,.2,1);max-width:90vw;text-align:center}
.toast.show{transform:translateX(-50%) translateY(0);opacity:1}
.toast.ok{border-color:rgba(16,185,129,.3);color:#34D399}
.toast.warn{border-color:rgba(200,144,24,.3);color:var(--g2)}

/* MODAL */
.mov{position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:500;display:none;align-items:flex-end;justify-content:center}
.mov.show{display:flex;animation:fIn .2s ease}
.msh{background:var(--s1);border-radius:18px 18px 0 0;width:100%;max-width:480px;padding:16px;max-height:88vh;overflow-y:auto;animation:slideUp .3s ease;border-top:1px solid var(--b2)}
.mhd{display:flex;align-items:center;justify-content:space-between;margin-bottom:13px}
.mt2{font-size:14px;font-weight:800}
.mcl{width:26px;height:26px;background:var(--card2);border:1px solid var(--b2);border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--t2)}

/* HEATMAP */
.hm{display:grid;grid-template-columns:repeat(13,1fr);gap:2px;margin:7px 0}
.hmc{aspect-ratio:1;border-radius:2px}
.h0{background:var(--b1)}.h1{background:rgba(200,144,24,.2)}.h2{background:rgba(200,144,24,.45)}.h3{background:rgba(200,144,24,.7)}.h4{background:var(--g1)}

/* EAGLE SVG */
.eagle-stage{display:flex;flex-direction:column;align-items:center;padding:16px 0 10px}
.eagle-svg{width:180px;height:165px;animation:soar 4s ease-in-out infinite}
.eagle-nm{font-size:16px;font-weight:900;color:var(--g2);margin-top:8px}
.eagle-lv{font-size:10px;color:var(--t2);margin-top:2px}
.xp-bar{width:130px;height:3px;background:var(--b1);border-radius:99px;margin-top:8px;overflow:hidden}
.xp-f{height:100%;background:var(--gg);border-radius:99px;transition:width 1s ease}

/* TIMER RING */
.ring-w{position:relative;width:190px;height:190px;margin:0 auto 12px}
.rsvg{width:100%;height:100%;transform:rotate(-90deg)}
.rt{fill:none;stroke:var(--b2);stroke-width:9}
.rp{fill:none;stroke:url(#gg);stroke-width:9;stroke-linecap:round;stroke-dasharray:534;stroke-dashoffset:534;transition:stroke-dashoffset .5s ease}
.rp.rest{stroke:url(#gr)}
.rc{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.rt2{font-size:42px;font-weight:900;font-family:'IBM Plex Mono';letter-spacing:-2px;line-height:1}
.rl{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:1px}
.tph{font-size:9px;padding:4px 12px;border-radius:99px;font-weight:700;letter-spacing:.5px;margin-bottom:11px;border:1px solid;font-family:'IBM Plex Mono'}
.tpf{background:rgba(200,144,24,.07);color:var(--g2);border-color:rgba(200,144,24,.22)}
.tpr{background:rgba(16,185,129,.07);color:#34D399;border-color:rgba(16,185,129,.18)}
.skbox{display:flex;align-items:center;gap:10px;padding:11px 14px;background:linear-gradient(135deg,rgba(200,144,24,.05),var(--card));border:1px solid rgba(200,144,24,.18);border-radius:11px}
.skn{font-size:30px;font-weight:900;font-family:'IBM Plex Mono';color:var(--g2)}

/* ROADMAP STEP */
.rms{display:flex;gap:10px;padding:11px 12px;background:var(--card2);border:1px solid var(--b1);border-radius:9px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.rms:hover{border-color:var(--b2)}
.rms.done{border-color:rgba(16,185,129,.18);background:rgba(16,185,129,.03)}
.rms.act{border-color:rgba(200,144,24,.22);background:rgba(200,144,24,.03)}
.rms.lock{opacity:.5;cursor:not-allowed}
.rmi{width:35px;height:35px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.rmb{flex:1;min-width:0}.rmt{font-size:12px;font-weight:700;margin-bottom:2px}.rmd{font-size:10px;color:var(--t2)}
.rmf{display:flex;gap:5px;margin-top:5px;align-items:center;flex-wrap:wrap}

/* VAULT */
.vq{padding:12px;background:var(--card2);border:1px solid var(--b1);border-radius:9px;margin-bottom:6px}
.vo{padding:8px 11px;border:1px solid var(--b2);border-radius:7px;cursor:pointer;font-size:12px;transition:all .15s;margin-bottom:4px}
.vo:hover{border-color:rgba(200,144,24,.3)}
.vo.cr{border-color:#10B981!important;background:rgba(16,185,129,.05)!important;color:#34D399!important}
.vo.wr{border-color:#EF4444!important;background:rgba(239,68,68,.05)!important;color:#F87171!important}
.vtip{display:none;padding:7px 10px;background:rgba(16,185,129,.05);border-right:3px solid #10B981;border-radius:6px;font-size:10px;color:#34D399;margin-top:6px}
.vtip.sh{display:block;animation:fIn .3s ease}

/* CEFR */
.cefr-g{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin:8px 0}
.cfb{padding:10px;border-radius:8px;border:1px solid var(--b1);text-align:center;cursor:pointer;transition:all .2s}
.cfb:hover{border-color:var(--g1)}
.cfb.on{background:rgba(200,144,24,.07);border-color:rgba(200,144,24,.3)}
.cfc{font-size:16px;font-weight:900;font-family:'IBM Plex Mono';color:var(--g2)}
.cfn{font-size:9px;color:var(--t2);margin-top:2px}

/* PERSONALITY */
.pt-g{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.ptb{padding:10px;border-radius:8px;background:var(--card2);border:1px solid var(--b1)}
.ptv{font-size:19px;font-weight:900;font-family:'IBM Plex Mono';color:var(--g2)}
.ptn{font-size:9px;color:var(--t2);margin-top:2px}

/* SCHEDULE */
.dslot{background:var(--card2);border:1px solid var(--b1);border-radius:9px;margin-bottom:5px;overflow:hidden}
.dh{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;cursor:pointer}
.dn{font-size:13px;font-weight:700}
.dhr{font-size:9px;font-family:'IBM Plex Mono';color:var(--g2)}
.dsess{padding:0 12px 8px;display:none}
.dsess.op{display:block;animation:fIn .2s ease}
.sblk{display:flex;align-items:center;gap:7px;padding:6px 0;border-top:1px solid var(--b1)}
.stm{font-size:9px;font-family:'IBM Plex Mono';color:var(--t2);width:70px;flex-shrink:0}
.ssub{font-size:11px;font-weight:600;flex:1}
.stype{font-size:9px;padding:2px 6px;border-radius:99px;font-weight:700}
.st-s{background:rgba(200,144,24,.09);color:var(--g2)}
.st-r{background:rgba(16,185,129,.09);color:#34D399}
.st-t{background:rgba(239,68,68,.09);color:#F87171}

/* SOCIAL */
.sc{display:flex;align-items:center;gap:9px;padding:10px 12px;background:var(--card2);border:1px solid var(--b1);border-radius:9px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.sc:hover{border-color:var(--b2)}
.uav{width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:#fff;flex-shrink:0}
.un{font-size:12px;font-weight:700;margin-bottom:1px}
.um{display:flex;gap:6px;font-size:10px;color:var(--t2);align-items:center;flex-wrap:wrap}
.pmi{width:40px;height:3px;background:var(--b1);border-radius:99px;overflow:hidden}
.pmf{height:100%;background:var(--gg);border-radius:99px}

/* LESSON CARD */
.lc{display:flex;align-items:center;gap:10px;padding:11px 12px;background:var(--card2);border:1px solid var(--b1);border-radius:9px;margin-bottom:6px;cursor:pointer;transition:border-color .15s}
.lc:hover{border-color:var(--b2)}
.lc.done{border-color:rgba(16,185,129,.18)}
.lc.lock{opacity:.5;cursor:not-allowed}
.lplay{width:40px;height:40px;border-radius:8px;background:var(--gg);display:flex;align-items:center;justify-content:center;font-size:14px;color:#000;flex-shrink:0}
.lth{width:40px;height:40px;border-radius:8px;background:var(--card);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;color:var(--t2)}
.lb{flex:1;min-width:0}
.lt2{font-size:12px;font-weight:700;margin-bottom:2px}
.lm{font-size:10px;color:var(--t2);display:flex;gap:6px;align-items:center}

/* FEATHERS */
.fi{background:var(--card);border:1px solid var(--b1);border-radius:11px;margin-bottom:8px;overflow:hidden}
.fih{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer}
.fid{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fit{font-size:12px;font-weight:700;flex:1}
.fia{color:var(--t3);font-size:12px;transition:transform .2s}
.fi.op .fia{transform:rotate(90deg)}
.fib{display:none;padding:0 14px 12px}
.fi.op .fib{display:block;animation:fIn .2s ease}
.fmsgs{max-height:170px;overflow-y:auto;margin-bottom:7px}
.fmsg{padding:8px 10px;background:var(--card2);border-radius:7px;border:1px solid var(--b1);margin-bottom:4px}
.fmm{display:flex;justify-content:space-between;font-size:9px;color:var(--t3);margin-bottom:3px;font-family:'IBM Plex Mono'}
.fmt{font-size:11px;line-height:1.7}

/* PRICING */
.prc{background:var(--card);border:1px solid var(--b1);border-radius:13px;padding:16px;margin-bottom:9px;position:relative;overflow:hidden;transition:all .2s}
.prc:hover{transform:translateY(-2px)}
.prc.feat{border-color:rgba(200,144,24,.3);background:linear-gradient(160deg,rgba(200,144,24,.04),var(--card))}
.prc.feat::before{content:'الأفضل';position:absolute;top:0;right:0;background:var(--gg);color:#000;font-size:9px;font-weight:800;padding:3px 11px;border-radius:0 0 0 8px;font-family:'IBM Plex Mono'}
.ptr{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;font-family:'IBM Plex Mono';margin-bottom:6px}
.pam{font-size:
