<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة درب | طريقك للقمة</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #0d1117;
            --card-bg: #161b22;
            --main-gold: #c6a355;
            --text-white: #ffffff;
            --input-bg: #0d1117;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-white);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        /* القائمة العلوية */
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: var(--card-bg);
            width: 100%;
            position: fixed;
            top: 0;
            z-index: 1000;
            box-sizing: border-box;
            border-bottom: 1px solid #30363d;
        }

        /* كروت الميزات */
        .content {
            margin-top: 100px;
            width: 90%;
            max-width: 600px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 50px;
        }

        .feature-card {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            border: 1px solid #30363d;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
        }

        .feature-card:hover { transform: scale(1.02); border-color: var(--main-gold); }

        .lock-icon {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--main-gold);
            font-size: 20px;
        }

        /* نافذة الدخول المنبثقة */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .auth-container {
            width: 90%;
            max-width: 380px;
            background: var(--card-bg);
            padding: 30px;
            border-radius: 20px;
            text-align: center;
            border: 1px solid var(--main-gold);
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 10px;
            border: 1px solid #30363d;
            background: var(--input-bg);
            color: white;
            box-sizing: border-box;
        }

        .main-btn {
            width: 100%;
            padding: 12px;
            background: var(--main-gold);
            border: none;
            border-radius: 10px;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .social-btn {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            border-radius: 10px;
            border: 1px solid #30363d;
            background: transparent;
            color: white;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
    </style>
</head>
<body>

    <nav>
        <div style="font-size: 24px; color: var(--main-gold); font-weight: bold;">🦅 درب</div>
        <button class="main-btn" style="width: auto; padding: 5px 20px; margin:0;" onclick="openAuth()">دخول</button>
    </nav>

    <div class="content">
        <h2 style="text-align: center;">مرحباً بك في درب القمة 🚀</h2>
        
        <div class="feature-card" onclick="checkAuth('المدار')">
            <h3>⏱️ المدار</h3>
            <p>نظم وقت مذاكرتك للتحصيلي بذكاء.</p>
            <i class="fas fa-lock lock-icon"></i>
        </div>

        <div class="feature-card" onclick="checkAuth('الخزنة')">
            <h3>📦 الخزنة</h3>
            <p>احفظ الأسئلة الصعبة وراجعها لاحقاً.</p>
            <i class="fas fa-lock lock-icon"></i>
        </div>

        <div class="feature-card" onclick="checkAuth('الرادار')">
            <h3>📡 الرادار</h3>
            <p>تتبع تقدمك ومستواك بين الطلاب.</p>
            <i class="fas fa-lock lock-icon"></i>
        </div>
    </div>

    <div id="auth-modal" class="modal-overlay">
        <div class="auth-container">
            <div style="text-align: left; cursor: pointer;" onclick="closeAuth()">✕</div>
            <h2 id="modal-title">تسجيل الدخول</h2>
            <input type="email" placeholder="البريد الإلكتروني">
            <input type="password" placeholder="كلمة المرور">
            <button class="main-btn">دخول</button>
            <p style="font-size: 13px;">ليس لديك حساب؟ <a href="#" onclick="openSignUp()" style="color:var(--main-gold)">إنشاء حساب جديد</a></p>
            <hr style="border: 0.1px solid #30363d; margin: 20px 0;">
            <button class="social-btn" style="color: #db4437;"><i class="fab fa-google"></i> جوجل</button>
            <button class="social-btn"><i class="fab fa-apple"></i> أبل</button>
            <button class="social-btn" style="color: #4267B2;"><i class="fab fa-facebook"></i> فيسبوك</button>
        </div>
    </div>

    <script>
        function openAuth() { document.getElementById('auth-modal').style.display = 'flex'; }
        function closeAuth() { document.getElementById('auth-modal').style.display = 'none'; }
        
        function checkAuth(name) {
            alert("عذراً! ميزة " + name + " تتطلب تسجيل دخول أولاً.");
            openAuth();
        }

        function openSignUp() {
            alert("جاري تحويلك لصفحة إنشاء الحساب والبيانات الشخصية...");
            // هنا مستقبلاً بنحط رابط صفحة الـ Sign up
        }
    </script>
</body>
</html>
