<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>درب | التطبيق الرسمي</title>
    <style>
        :root {
            --bg: #050708;
            --surface: #0d1117;
            --border: #21262d;
            --gold: #f0b90b;
            --gold-dim: #947a1c;
            --text-sec: #8b949e;
            --danger: #f85149;
        }

        body {
            margin: 0; background: var(--bg); color: white;
            font-family: 'Tajawal', sans-serif; display: flex; height: 100vh; overflow: hidden;
        }

        /* Sidebar - مستوحى من كود ريبلت */
        aside {
            width: 240px; background: var(--surface); border-left: 1px solid var(--border);
            display: flex; flexDirection: column; padding: 20px; box-sizing: border-box;
            display: flex; flex-direction: column;
        }

        .logo { font-size: 26px; font-weight: 900; color: var(--gold); margin-bottom: 30px; }

        nav { flex: 1; }
        .nav-item {
            display: flex; align-items: center; gap: 12px; padding: 12px;
            color: var(--text-sec); text-decoration: none; border-radius: 12px;
            transition: 0.2s; cursor: pointer; margin-bottom: 5px;
        }
        .nav-item.active { background: rgba(240, 185, 11, 0.1); color: var(--gold); font-weight: bold; }

        .upgrade-btn {
            background: linear-gradient(135deg, var(--gold), var(--gold-dim));
            border: none; padding: 12px; border-radius: 10px; color: #050708;
            font-weight: 800; cursor: pointer; margin-bottom: 15px;
        }

        /* Main Content */
        main { flex: 1; padding: 30px; overflow-y: auto; text-align: center; }

        .header { display: flex; justify-content: space-between; border-bottom: 1px solid var(--border); padding-bottom: 15px; margin-bottom: 30px; }

        /* Timer Card */
        .timer-card {
            background: var(--surface); padding: 40px; border-radius: 30px;
            border: 1px solid var(--border); display: inline-block; width: 100%; max-width: 400px;
        }

        .timer-display { font-size: 5rem; font-weight: 900; margin: 20px 0; }
        .btn-main {
            background: var(--gold); color: black; border: none; padding: 18px 40px;
            border-radius: 15px; font-size: 1.2rem; font-weight: bold; cursor: pointer; width: 100%;
        }

    </style>
</head>
<body>

    <aside>
        <div class="logo">درب</div>
        <nav>
            <div class="nav-item active">🏠 الرئيسية</div>
            <div class="nav-item">📊 خارطة التقدم</div>
            <div class="nav-item">👨‍👩‍👧 مركز الأسرة</div>
            <div class="nav-item">⭐ تقييم الأساتذة</div>
            <div class="nav-item">🔍 البحث عن صديق</div>
        </nav>

        <button class="upgrade-btn">ترقية الخطة 👑</button>
        
        <div style="border-top: 1px solid var(--border); padding-top: 15px;">
            <div style="font-size: 14px; font-weight: bold;">{displayName}</div>
            <div style="font-size: 12px; color: var(--text-sec);">🔥 12 يوم | ⏱️ 420د</div>
        </div>
    </aside>

    <main>
        <div class="header">
            <h2 style="font-size: 16px; color: var(--text-sec);">لوحة التحكم</h2>
            <div style="color: var(--gold);">👑 نخبة (Elite)</div>
        </div>

        <div class="timer-card">
            <div style="color: var(--text-sec);">المدار الحالي (50 دقيقة)</div>
            <div class="timer-display" id="clock">50:00</div>
            <button class="btn-main" onclick="startTimer()">ابدأ المدار</button>
        </div>
        
        <p style="margin-top: 20px; color: var(--text-sec);">مرحباً بك يا محمد، جاهز للتحصيلي اليوم؟</p>
    </main>

    <script>
        let timeLeft = 50 * 60;
        function startTimer() {
            setInterval(() => {
                if(timeLeft > 0) {
                    timeLeft--;
                    let m = Math.floor(timeLeft / 60);
                    let s = timeLeft % 60;
                    document.getElementById('clock').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
                }
            }, 1000);
        }
    </script>
</body>
</html>
