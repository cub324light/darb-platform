<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>درب — مؤقت التركيز</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Tajawal',sans-serif;
  background:#0A0D13;color:#F1F5FF;
  min-height:100vh;display:flex;
  flex-direction:column;align-items:center;
  justify-content:center;padding:20px;
}
h1{
  font-size:32px;font-weight:900;
  margin-bottom:8px;text-align:center;
  background:linear-gradient(135deg,#1D4ED8,#60A5FA);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.sub{color:#8899BB;font-size:14px;margin-bottom:40px;text-align:center}
.ring-wrap{position:relative;width:240px;height:240px;margin-bottom:28px}
svg{width:100%;height:100%;transform:rotate(-90deg)}
.track{fill:none;stroke:#1F2A42;stroke-width:12}
.prog{
  fill:none;stroke:url(#g);stroke-width:12;
  stroke-linecap:round;stroke-dasharray:691;
  stroke-dashoffset:691;transition:stroke-dashoffset .5s ease;
}
.center{
  position:absolute;inset:0;display:flex;
  flex-direction:column;align-items:center;justify-content:center;
}
.time{font-size:52px;font-weight:900;letter-spacing:-2px;line-height:1}
.phase{font-size:13px;color:#8899BB;margin-top:4px}
.badge{
  padding:6px 20px;border-radius:99px;font-size:13px;
  font-weight:700;margin-bottom:20px;
}
.focus-b{background:#1D4ED822;color:#60A5FA;border:1px solid #1D4ED844}
.rest-b{background:#10B98122;color:#10B981;border:1px solid #10B98144}
.btns{display:flex;gap:12px;margin-bottom:32px}
button{
  padding:12px 28px;border-radius:10px;border:none;
  font-family:'Tajawal';font-size:15px;font-weight:700;cursor:pointer;
  transition:all .15s;
}
.start{background:linear-gradient(135deg,#1D4ED8,#3B82F6);color:#fff}
.start:hover{transform:translateY(-2px)}
.reset{background:#1F2A42;color:#8899BB}
.streak-box{
  display:flex;align-items:center;gap:14px;
  padding:16px 24px;background:#161C2D;
  border:1px solid #1F2A42;border-radius:14px;
}
.streak-num{font-size:36px;font-weight:900;color:#F59E0B}
.streak-label{font-size:12px;color:#8899BB}
.streak-val{font-size:14px;font-weight:700;margin-top:2px}
</style>
</head>
<body>

<h1>منصة درب 🦅</h1>
<p class="sub">نظام التركيز 50/10</p>

<div class="ring-wrap">
  <svg viewBox="0 0 220 220">
    <defs>
      <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
        <stop offset="0%" style="stop-color:#1D4ED8"/>
        <stop offset="100%" style="stop-color:#60A5FA"/>
      </linearGradient>
    </defs>
    <circle class="track" cx="110" cy="110" r="110"/>
    <circle class="prog" id="prog" cx="110" cy="110" r="110"/>
  </svg>
  <div class="center">
    <div class="time" id="display">50:00</div>
    <div class="phase" id="phaselabel">تركيز</div>
  </div>
</div>

<div class="badge focus-b" id="phasebadge">🎯 وضع التركيز</div>

<div class="btns">
  <button class="start" id="btn" onclick="toggle()">▶ ابدأ</button>
  <button class="reset" onclick="reset()">↺ إعادة</button>
</div>

<div class="streak-box">
  <div style="font-size:28px">🔥</div>
  <div>
    <div class="streak-label">سلسلة الأيام</div>
    <div class="streak-val">
      <span class="streak-num" id="streak">0</span> يوم
    </div>
  </div>
  <div style="margin-right:auto;text-align:center">
    <div class="streak-num" style="font-size:24px" id="sessions">0</div>
    <div class="streak-label">جلسات اليوم</div>
  </div>
</div>

<script>
let running=false, phase='focus', elapsed=0;
let total=50*60, interval=null;
let sessions=parseInt(localStorage.getItem('sessions')||0);
let streak=parseInt(localStorage.getItem('streak')||0);
let lastDay=localStorage.getItem('lastDay')||'';

document.getElementById('sessions').textContent=sessions;
document.getElementById('streak').textContent=streak;

function toggle(){
  if(running){
    clearInterval(interval);running=false;
    document.getElementById('btn').textContent='▶ استمر';
  } else {
    running=true;
    document.getElementById('btn').textContent='⏸ إيقاف';
    interval=setInterval(tick,1000);
  }
}

function tick(){
  elapsed++;
  let dur=phase==='focus'?total:10*60;
  let left=dur-elapsed;
  let m=Math.floor(left/60).toString().padStart(2,'0');
  let s=(left%60).toString().padStart(2,'0');
  document.getElementById('display').textContent=m+':'+s;
  document.getElementById('prog').style.strokeDashoffset=691*(1-elapsed/dur);

  if(elapsed>=dur){
    elapsed=0;
    if(phase==='focus'){
      phase='rest';
      sessions++;
      document.getElementById('sessions').textContent=sessions;
      localStorage.setItem('sessions',sessions);
      let today=new Date().toDateString();
      if(lastDay!==today){
        streak++;lastDay=today;
        localStorage.setItem('streak',streak);
        localStorage.setItem('lastDay',lastDay);
        document.getElementById('streak').textContent=streak;
      }
      document.getElementById('phasebadge').className='badge rest-b';
      document.getElementById('phasebadge').textContent='☕ وقت الراحة';
      document.getElementById('phaselabel').textContent='راحة';
      document.getElementById('display').textContent='10:00';
    } else {
      phase='focus';
      document.getElementById('phasebadge').className='badge focus-b';
      document.getElementById('phasebadge').textContent='🎯 وضع التركيز';
      document.getElementById('phaselabel').textContent='تركيز';
      document.getElementById('display').textContent='50:00';
    }
  }
}

function reset(){
  clearInterval(interval);running=false;phase='focus';elapsed=0;
  document.getElementById('display').textContent='50:00';
  document.getElementById('btn').textContent='▶ ابدأ';
  document.getElementById('phasebadge').className='badge focus-b';
  document.getElementById('phasebadge').textContent='🎯 وضع التركيز';
  document.getElementById('phaselabel').textContent='تركيز';
  document.getElementById('prog').style.strokeDashoffset=691;
}
</script>
</body>
</html>
