<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>درب - بيئة التركيز والانضباط</title>
    <style>
        /* هندسة الألوان (الهوية البصرية الجديدة: أسود وأزرق ملكي) */
        :root {
            --dark-bg: #050509; /* أسود ملكي عميق */
            --panel-bg: #0e101a; /* رمادي كربوني داكن للبنلات */
            --royal-blue: #007bff; /* أزرق ملكي نيون للتركيز */
            --silver: #e0e0e0;
            --gold: #f9a826;
            --danger: #ff4d4d;
            --text-main: #ffffff;
            --text-muted: #8b949e;
        }

        body {
            background-color: var(--dark-bg);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            text-align: center;
            overflow-x: hidden;
        }

        /* الشريط العلوي (الاقتصاد والوهج) */
        .header {
            display: flex;
            justify-content: space-between;
            padding: 15px 20px;
            background-color: var(--panel-bg);
            border-bottom: 1px solid #1f2937;
            font-size: 1rem;
            font-weight: bold;
        }
        .silver-text { color: var(--silver); display: flex; align-items: center; gap: 5px; }
        .gold-text { color: var(--gold); display: flex; align-items: center; gap: 5px; }
        .streak-text { color: var(--danger); display: flex; align-items: center; gap: 5px; }

        /* منطقة الطائر */
        .avatar-section {
            margin: 30px auto;
            position: relative;
        }
        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            border: 3px solid var(--royal-blue);
            cursor: pointer;
            transition: transform 0.4s ease, box-shadow 0.4s ease;
            /* استبدال الصورة بعنقاء فخمة */
            background: url('https://i.pinimg.com/7364x/41/5a/29/415a298818f9dfd6e49492167d4a66a1.jpg') center/cover;
            box-shadow: 0 0 20px rgba(0, 123, 255, 0.3);
            margin: 0 auto;
        }
        .avatar:hover {
            transform: scale(1.05) rotate(3deg);
            box-shadow: 0 0 40px rgba(0, 123, 255, 0.7);
        }
        .hint { color: var(--text-muted); font-size: 0.85rem; margin-top: 10px; }

        /* محرك المدار (المؤقت) */
        .timer-panel {
            background-color: var(--panel-bg);
            width: 85%;
            max-width: 340px;
            margin: 20px auto;
            padding: 25px;
            border-radius: 20px;
            border: 1px solid #1f2937;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .panel-title {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0 0 15px 0;
            letter-spacing: 1px;
        }
        .time-display {
            font-size: 4.5rem;
            color: var(--text-main);
            margin: 10px 0;
            font-weight: bold;
            font-variant-numeric: tabular-nums;
            text-shadow: 0 0 15px rgba(255,255,255,0.1);
        }
        .btn {
            background-color: var(--royal-blue);
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s ease;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }
        .btn:hover { background-color: #0062cc; transform: translateY(-2px); }
        .btn:active { transform: translateY(1px); }
        
        .btn-danger { background-color: transparent; color: var(--danger); border: 2px solid var(--danger); margin-top: 10px; padding: 12px; font-size: 1rem;}
        .btn-danger:hover { background-color: var(--danger); color: white; }

        /* إحصائيات اليوم (جلسات اليوم) */
        .stats-panel {
            background-color: var(--panel-bg);
            width: 85%;
            max-width: 340px;
            margin: 20px auto;
            padding: 15px 25px;
            border-radius: 15px;
            border: 1px solid #1f2937;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .stat-item { text-align: right; }
        .stat-label { color: var(--text-muted); font-size: 0.85rem; }
        .stat-value { color: var(--text-main); font-size: 1.5rem; font-weight: bold; }

        /* عقل الطائر (The Inner Sanctum) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.97);
            z-index: 1000;
            animation: fadeIn 0.4s ease;
            backdrop-filter: blur(5px);
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .modal-content { margin-top: 10vh; padding: 20px; }
        .feathers-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 30px;
        }
        .feather {
            width: 100px;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid;
            cursor: pointer;
            transition: 0.3s;
            background: rgba(255,255,255,0.03);
            text-align: center;
        }
        .feather:hover { transform: translateY(-5px); background: rgba(255,255,255,0.07); }
        .f-white { border-color: #333; color: white; }
        .f-blue { border-color: var(--royal-blue); color: var(--royal-blue); }
        .f-green { border-color: var(--success); color: var(--success); }
        .feather h3 { margin: 0 0 10px 0; font-size: 1.5rem; }
        .feather p { margin: 0; font-size: 0.8rem; color: var(--text-main); }
        
        .close-modal {
            margin-top: 40px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1rem;
            cursor: pointer;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="streak-text"><span>🔥</span> <span id="streakCount">1</span> أيام</div>
        <div style="display:flex; gap: 15px;">
            <span class="silver-text"><span>🪙</span> <span id="silverCount">0</span> فضة</span> 
            <span class="gold-text"><span>👑</span> <span id="goldCount">0</span> ذهب</span>
        </div>
    </div>

    <div class="avatar-section">
        <div class="avatar" onclick="openSanctum()"></div>
        <div class="hint">(اضغط على العنقاء لدخول عقل الطائر)</div>
    </div>

    <div class="timer-panel">
        <p class="panel-title">محرك المدار (50/10)</p>
        <div class="time-display" id="timeDisplay">50:00</div>
        <button class="btn" id="mainBtn" onclick="toggleTimer()">
            <span>▶️</span> ابدأ المدار
        </button>
        <button class="btn btn-danger" id="resetBtn" onclick="resetTimer()" style="display:none;">كسر المدار (انسحاب)</button>
    </div>
